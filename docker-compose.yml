
services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: yuichat-app
    container_name: yuichat_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www:z
    networks:
      - yuichat_network
    depends_on:
      - mariadb
      - mongodb

  web:
    image: nginx:alpine
    container_name: yuichat_web
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./:/var/www:z
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:z
    networks:
      - yuichat_network
    depends_on:
      - app

  mariadb:
    image: mariadb:10.11
    container_name: yuichat_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: yuichat
      MYSQL_USER: admin
      MYSQL_PASSWORD: 123456
    ports:
      - "3307:3306"
    volumes:
      - yuichat_mariadb_data:/var/lib/mysql
    networks:
      - yuichat_network

  mongodb:
    image: mongo:6.0
    container_name: yuichat_mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - yuichat_mongodb_data:/data/db
    networks:
      - yuichat_network

  queue:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: yuichat-app
    container_name: yuichat_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - ./:/var/www:z
    networks:
      - yuichat_network
    depends_on:
      - mariadb
      - mongodb

networks:
  yuichat_network:
    driver: bridge

volumes:
  yuichat_mariadb_data:
    driver: local
  yuichat_mongodb_data:
    driver: local
